name: Deploy to Amplify

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          sudo mv mdbook /usr/local/bin/

      - name: Build
        run: mdbook build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::668076963688:role/github-actions-amplify-deploy
          aws-region: us-east-1

      - name: Deploy to Amplify
        run: |
          deploy=$(aws amplify create-deployment --app-id d367t8hqqezew6 --branch-name main --query '{jobId: jobId, zipUploadUrl: zipUploadUrl}' --output json)

          cd _build
          zip -r /tmp/deploy.zip .
          cd ..

          upload_url=$(echo "$deploy" | jq -r '.zipUploadUrl')
          job_id=$(echo "$deploy" | jq -r '.jobId')

          curl -T /tmp/deploy.zip "$upload_url"

          aws amplify start-deployment --app-id d367t8hqqezew6 --branch-name main --job-id "$job_id"
